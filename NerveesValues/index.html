<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Nervees Values</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>🌙 Nervees Values</h1>
    <p>Adopt Me Value Calculator</p>
</header>


<section class="search-box">
    <input 
        type="text" 
        placeholder="🔍 Search pets, vehicles, items..."
    >
</section>


<section class="categories">

    <div class="category">
        🐾
        <h3>Pets</h3>
    </div>

    <div class="category">
        🚗
        <h3>Vehicles</h3>
    </div>

    <div class="category">
        👕
        <h3>Wearables</h3>
    </div>

    <div class="category">
        🧸
        <h3>Toys</h3>
    </div>

</section>


<h2>🔥 Popular Pets</h2>


<section class="cards">


<div class="pet-card">

    <div class="pet-image">
        🐉
    </div>

    <h3>Frost Dragon</h3>

    <p>🧪 240 RP</p>

    <span class="badge">
        NFR
    </span>

</div>


<div class="pet-card">

    <div class="pet-image">
        🦇
    </div>

    <h3>Bat Dragon</h3>

    <p>🧪 300 RP</p>

    <span class="badge mega">
        MFR
    </span>

</div>


</section>


<button class="calculator">
    ⚖️ Trade Calculator
</button>


</body>
</html>
